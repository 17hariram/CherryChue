<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf8f3"/>
      <stop offset="100%" stop-color="#f5ede4"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9606a"/>
      <stop offset="100%" stop-color="#a84450"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>
  <rect x="3" y="3" width="94" height="94" rx="16" fill="none" stroke="#c9606a" stroke-width="1.5" opacity="0.4"/>
  <!-- Stylized C letterform -->
  <text x="50" y="72" font-family="Georgia, serif" font-size="62" font-weight="400" fill="url(#rose)" text-anchor="middle" font-style="italic">C</text>
  <!-- Small decorative star -->
  <text x="76" y="38" font-family="Georgia, serif" font-size="14" fill="#c9993a" text-anchor="middle">✦</text>
</svg>
